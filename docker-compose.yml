version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# All configuration lives in your .env file (copied from .env.example).
# The ONLY two values you must set before first run are:
#   HA_URL   — e.g. http://192.168.1.100:8123
#   HA_TOKEN — a Long-Lived Access Token from HA → Profile → Security
# Everything else has sensible defaults.
# ─────────────────────────────────────────────────────────────────────────────

services:
  sigenergy-optimizer:
    build: .
    container_name: sigenergy_optimizer
    restart: unless-stopped
    ports:
      - "7123:7123"
    env_file: .env
    networks:
      - ha_network

networks:
  ha_network:
    driver: bridge
